<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Robot Face Cute</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="frame" onclick="changeFace()">
  <svg class="face" viewBox="0 0 300 150">

    <!-- EYES -->
    <ellipse id="eyeL" cx="90" cy="70" rx="24" ry="34" class="eye"/>
    <ellipse id="eyeR" cx="210" cy="70" rx="24" ry="34" class="eye"/>

    <!-- PUPILS -->
    <circle id="pupilL" cx="90" cy="70" r="6" class="pupil"/>
    <circle id="pupilR" cx="210" cy="70" r="6" class="pupil"/>

    <!-- LASHES -->
    <path d="M70 40 Q90 20 110 40" class="lashes"/>
    <path d="M190 40 Q210 20 230 40" class="lashes"/>

    <!-- BLUSH -->
    <ellipse id="blushL" cx="60" cy="95" rx="12" ry="6" class="blush"/>
    <ellipse id="blushR" cx="240" cy="95" rx="12" ry="6" class="blush"/>

    <!-- MOUTH -->
    <path id="mouth" d="M130 110 Q150 120 170 110" class="mouth"/>

    <!-- TONGUE -->
    <ellipse id="tongue" cx="150" cy="120" rx="8" ry="12" class="tongue"/>

    <!-- TEARS -->
    <ellipse id="tearL" cx="90" cy="95" rx="4" ry="8" class="tear"/>
    <ellipse id="tearR" cx="210" cy="95" rx="4" ry="8" class="tear"/>

    <!-- ZZZ -->
    <text id="zzz" x="240" y="30" class="zzz">ZzZ</text>

    <!-- GLASSES -->
    <ellipse id="glassL" cx="90" cy="70" rx="28" ry="36" class="glasses"/>
    <ellipse id="glassR" cx="210" cy="70" rx="28" ry="36" class="glasses"/>
    <line id="bridge" x1="118" y1="70" x2="182" y2="70" class="glasses-line"/>

  </svg>
</div>

<!-- SOUND -->
<audio id="clickSound" src="sounds/click.mp3" preload="auto"></audio>

<script>
let state = 0;

/* elements */
const eyeL = document.getElementById("eyeL");
const eyeR = document.getElementById("eyeR");
const mouth = document.getElementById("mouth");

const pupilL = document.getElementById("pupilL");
const pupilR = document.getElementById("pupilR");

const blushL = document.getElementById("blushL");
const blushR = document.getElementById("blushR");

const tongue = document.getElementById("tongue");
const tearL = document.getElementById("tearL");
const tearR = document.getElementById("tearR");
const zzz = document.getElementById("zzz");

const glassL = document.getElementById("glassL");
const glassR = document.getElementById("glassR");
const bridge = document.getElementById("bridge");

/* sound */
const clickSound = document.getElementById("clickSound");
clickSound.volume = 0.3;

function playSound(){
  clickSound.currentTime = 0;
  clickSound.playbackRate = 0.9 + Math.random()*0.3; // random pitch
  clickSound.play();
}

/* pupil follow mouse */
document.addEventListener("mousemove", (e) => {
  const rect = document.querySelector(".face").getBoundingClientRect();

  const x = (e.clientX - rect.left) / rect.width - 0.5;
  const y = (e.clientY - rect.top) / rect.height - 0.5;

  const moveX = x * 8;
  const moveY = y * 8;

  pupilL.setAttribute("cx", 90 + moveX);
  pupilL.setAttribute("cy", 70 + moveY);

  pupilR.setAttribute("cx", 210 + moveX);
  pupilR.setAttribute("cy", 70 + moveY);
});

/* easing */
function ease(t){
  return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
}

/* animation engine */
function animate(duration, draw){
  let start = performance.now();
  function frame(time){
    let t = (time - start) / duration;
    if(t > 1) t = 1;
    draw(ease(t));
    if(t < 1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* reset */
function resetVisual(){
  tongue.classList.remove("showTongue");
  tearL.classList.remove("showTear");
  tearR.classList.remove("showTear");
  zzz.classList.remove("showZ");

  glassL.classList.remove("showGlass");
  glassR.classList.remove("showGlass");
  bridge.classList.remove("showGlassLine");

  blushL.classList.remove("showBlush");
  blushR.classList.remove("showBlush");
}

/* change face */
function changeFace(){

  playSound();

  state = (state + 1) % 8;
  resetVisual();

  animate(400, t => {

    let eyeOpen = 34;
    let mouthCurve = 120;

    switch(state){

      case 1: // happy 😊
        mouthCurve = 120 + 20*t;
        blushL.classList.add("showBlush");
        blushR.classList.add("showBlush");
        break;

      case 2: // sleepy 😴
        eyeOpen = 34 - 29*t;
        if(t > 0.6) zzz.classList.add("showZ");
        break;

      case 3: // cool 😎
        eyeOpen = 34 - 15*t;
        mouthCurve = 120 + 5*t;

        if(t > 0.5){
          glassL.classList.add("showGlass");
          glassR.classList.add("showGlass");
          bridge.classList.add("showGlassLine");
        }
        break;

      case 4: // cry 😢
        mouthCurve = 120 - 25*t;
        if(t > 0.6){
          tearL.classList.add("showTear");
          tearR.classList.add("showTear");
        }
        break;

      case 5: // smug 😏
        mouthCurve = 125;
        break;

      case 6: // silly 🤪
        eyeOpen = 15;
        mouthCurve = 145;
        blushL.classList.add("showBlush");
        blushR.classList.add("showBlush");
        break;

      case 7: // tongue 😛
        mouthCurve = 145;
        if(t > 0.6) tongue.classList.add("showTongue");
        break;
    }

    eyeL.setAttribute("ry", eyeOpen);
    eyeR.setAttribute("ry", eyeOpen);

    mouth.setAttribute("d", `M130 110 Q150 ${mouthCurve} 170 110`);
  });
}

/* blink */
setInterval(() => {

  if(state === 2) return;

  animate(120, t => {
    let val = 34 - (29*t);
    eyeL.setAttribute("ry", val);
    eyeR.setAttribute("ry", val);
  });

  setTimeout(() => {
    animate(120, t => {
      let val = 5 + (29*t);
      eyeL.setAttribute("ry", val);
      eyeR.setAttribute("ry", val);
    });
  }, 120);

}, 3000);

</script>

</body>
</html>
